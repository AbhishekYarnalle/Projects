<!DOCTYPE html>
<html>
<head>
<title>Contact Support</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron', sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    min-height:100vh;
}
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:rgba(0,0,0,0.6);
    box-shadow:0 0 20px cyan;
}

.logo{
    font-size:24px;
    color:cyan;
    text-shadow:0 0 15px cyan;
}

.nav-links a{
    text-decoration:none;
    margin-left:15px;
    padding:8px 15px;
    border-radius:5px;
    transition:0.3s;
    font-size:12px;
    font-weight:bold;
}

.nav-links a:hover{
    box-shadow:0 0 20px cyan;
}

/* Buttons */
.btn{
    border:2px solid cyan;
    color:cyan;
}

.btn:hover{
    background:cyan;
    color:black;
}

.logout{
    background:red;
    border:none;
    color:white;
}

.logout:hover{
    box-shadow:0 0 20px red;
}

/* HERO */
.hero{
    text-align:center;
    padding:80px 20px 40px;
}

.hero h1{
    font-size:40px;
    color:cyan;
    text-shadow:0 0 25px cyan;
    margin-bottom:15px;
}

.hero p{
    opacity:0.8;
}
.container{
    padding:60px 20px;
    text-align:center;
}

.container h1{
    color:cyan;
    margin-bottom:30px;
    text-shadow:0 0 20px cyan;
}

form{
    max-width:500px;
    margin:auto;
    background:rgba(0,0,0,0.6);
    padding:30px;
    border-radius:15px;
    border:1px solid cyan;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:none;
    border-radius:5px;
    outline:none;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    background:cyan;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    box-shadow:0 0 20px cyan;
}

.footer{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.6);
    margin-top:40px;
}
</style>
</head>

<body>

    <div class="navbar">
        <div class="logo">AI-WaterGuard</div>
        <div class="nav-links">
            <a href="/" class="btn">Home</a>
            <a href="/predict" class="btn">Predict</a>
            <a href="/about" class="btn">About</a>
            <a href="/analysis" class="btn">Analysis</a>
            <a href="/solution" class="btn">Solution</a>
            <a href="/contact" class="btn">Contact</a>
            <a href="/vis" class="btn">Visualization</a>
            <a href="/info" class="btn">Info</a>
    
            <a href="/logout" class="nav-links logout">Logout</a>
        </div>
    </div>


<div class="container">
    <h1>Contact Support</h1>

    <form method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" rows="5" placeholder="Your Message..." required></textarea>
        <button type="submit">Send Message</button>
    </form>
</div>

<div class="footer">
    © 2026 WaterGuard AI | Technical Support
</div>

</body>
</html>
