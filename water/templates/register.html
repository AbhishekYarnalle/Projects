<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{background:#e0f7fa;font-family:Arial;text-align:center}
form{background:white;padding:30px;width:350px;margin:auto;margin-top:80px;border-radius:10px}
input{width:100%;padding:8px;margin:5px}
button{background:#00acc1;color:white;padding:10px;border:none;width:100%}
</style>
</head>
<body>
<form method="POST">
<h2>Create Account</h2>
<input type="text" name="username" placeholder="Username" required>
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<button>Register</button>
</form>
</body>
</html>
