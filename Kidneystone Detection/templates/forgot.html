<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<style>
body{
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#2b5876,#4e4376);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.box{
    width:420px;
    padding:35px;
    border-radius:22px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(18px);
    text-align:center;
}
input{
    width:100%;
    padding:14px;
    border-radius:30px;
    border:none;
    margin-bottom:15px;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#0a4275;
    color:white;
}
a{
    color:#ffd700;
    text-decoration:none;
}
</style>
</head>

<body>
<div class="box">
    <h2>🔑 Forgot Password</h2>
    <input type="email" placeholder="Registered Email">
    <button>Reset</button>
    <p><a href="/login">Back to Login</a></p>
</div>
</body>
</html>
