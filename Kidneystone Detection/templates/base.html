<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Kidney Stone AI{% endblock %}</title>

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */

body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:linear-gradient(135deg,#010b10,#062b33,#01070a);
    color:#eaffff;
    min-height:100vh;
}

/* HEADER */

header{
    background:linear-gradient(90deg,#000,#062a31);
    padding:20px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,255,255,0.4);
    position:sticky;
    top:0;
    z-index:1000;
}

header h1{
    font-size:26px;
    color:#00f2ff;
    letter-spacing:1px;
    margin-bottom:10px;
}

/* NAVBAR */

nav{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

nav a{
    color:#7cf9ff;
    text-decoration:none;
    font-size:16px;
    font-weight:600;
    padding:8px 14px;
    border-radius:8px;
    transition:0.3s;
}

nav a:hover{
    background:#00f2ff;
    color:#002b30;
    box-shadow:0 0 15px cyan;
}

/* MAIN CONTAINER */

.container{
    padding:50px 20px;
    max-width:1200px;
    margin:auto;
}

/* CARD */

.card{
    background:linear-gradient(160deg,#03151a,#01090d);
    padding:35px;
    border-radius:18px;
    box-shadow:0 0 25px rgba(0,255,255,0.2);
    margin-bottom:35px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 35px rgba(0,255,255,0.6);
}

/* BUTTON */

button{
    background:linear-gradient(135deg,#00f2ff,#00aaff);
    border:none;
    padding:12px 30px;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
    color:#002b30;
    font-size:15px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 18px cyan;
}

/* LINK BUTTON */

.btn{
    display:inline-block;
    background:linear-gradient(135deg,#00f2ff,#00aaff);
    padding:12px 26px;
    border-radius:10px;
    text-decoration:none;
    color:#002b30;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 18px cyan;
}

/* TITLES */

h2{
    color:#00f2ff;
    margin-bottom:20px;
}

h3{
    color:#7cf9ff;
    margin-bottom:10px;
}

/* TEXT */

p{
    line-height:1.6;
}

/* FOOTER */

footer{
    margin-top:60px;
    background:#000;
    padding:18px;
    text-align:center;
    color:#aaa;
    border-top:1px solid #0ff;
    font-size:14px;
}

/* RESPONSIVE */

@media(max-width:768px){

nav{
    gap:10px;
}

nav a{
    font-size:14px;
}

.container{
    padding:30px 15px;
}

}

</style>
</head>

<body>

<header>

<h1>🧠 Kidney Stone Detection System</h1>

<nav>
<a href="/index">Home</a>
<a href="/predict">Predict</a>
<a href="/analysis">Analysis</a>
<a href="/solutions">Solutions</a>
<a href="/project">Project Info</a>
<a href="/about">About</a>
<a href="/logout">Logout</a>
</nav>

</header>

<div class="container">
{% block content %}{% endblock %}
</div>

<footer>
© 2026 Kidney Stone AI | Flask + Machine Learning
</footer>

</body>
</html>
