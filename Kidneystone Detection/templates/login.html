<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Kidney Stone System</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#2b5876,#4e4376);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    width:420px;
    padding:35px;
    border-radius:22px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(18px);
    box-shadow:0 30px 60px rgba(0,0,0,0.35);
    text-align:center;
}

.login-card h2{
    color:#ffd700;
    margin-bottom:10px;
}

.login-card p{
    color:white;
    font-size:14px;
    margin-bottom:25px;
}

.login-card input{
    width:100%;
    padding:14px;
    border-radius:30px;
    border:none;
    outline:none;
    margin-bottom:15px;
    font-size:15px;
}

.login-card button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
}

.login-links{
    margin-top:18px;
    color:#ffd700;
    font-size:14px;
}

.login-links a{
    color:#ffd700;
    text-decoration:none;
    font-weight:600;
}
</style>
</head>

<body>

<div class="login-card">
    <h2>🔐 Login</h2>
    <p>Access the Kidney Stone System</p>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="login-links">
        <a href="/register">Register</a> &nbsp; | &nbsp;
        <a href="/forgot">Forgot Password?</a>
    </div>
</div>

</body>
</html>
